<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ブロック崩し</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ccc;
      gap: 12px;
      overflow: hidden;
    }
    #hud {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: #aaa;
    }
    #hud strong {
      color: #fff;
      font-weight: 500;
    }
    canvas {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      display: block;
      background: #0d0d1a;
      width: 480px; 
      max-width: 95vw; 
      height: auto;
      touch-action: none;
    }
    #hint {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.8;
      padding: 0 10px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-to-menu">← 戻る</a>
  <style>
    .back-to-menu {
      position: fixed; top: 10px; left: 10px;
      background-color: #3498db; color: #ffffff;
      text-decoration: none; padding: 8px 15px;
      border-radius: 20px; font-weight: bold; font-size: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9999;
    }
  </style>

  <div id="hud">
    <span>スコア: <strong id="score">0</strong></span>
    <span>残機: <strong id="lives">3</strong></span>
    <span>レベル: <strong id="level">1</strong></span>
  </div>

  <canvas id="canvas" width="480" height="360"></canvas>

  <div id="hint">
    PC: ← → で移動 | Shiftで一時停止<br>スマホ: スワイプで移動<br>
    Enter または タップ でスタート
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PADDLE_W = 72, PADDLE_H = 10, BALL_R = 7;
const ROWS = 5, COLS = 10;
const BLK_W = 42, BLK_H = 14, BLK_GAP = 2;
const BLK_START_X = (W - (COLS * (BLK_W + BLK_GAP) - BLK_GAP)) / 2;
const BLK_START_Y = 36;
const COLORS = ['#e24b4a','#ef9f27','#97c459','#378add','#d4537e','#1d9e75'];

let state = 'idle', score = 0, lives = 3, level = 1, paused = false;
let keys = {}, blocks = [], particles = [], missAnim = null;

let paddle = { x: W/2 - PADDLE_W/2, y: H - 28, w: PADDLE_W, h: PADDLE_H, speed: 5 };
let ball   = { x: W/2, y: H - 50, vx: 0, vy: 0, r: BALL_R };

function makeBlocks() {
  blocks = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      blocks.push({ x: BLK_START_X + c * (BLK_W + BLK_GAP), y: BLK_START_Y + r * (BLK_H + BLK_GAP), w: BLK_W, h: BLK_H, color: COLORS[r % COLORS.length], hp: 1, alive: true });
    }
  }
}

function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - BALL_R - 2;
  const spd = 3 + level * 0.4;
  const angle = -Math.PI/2 + (Math.random() - 0.5) * 0.8;
  ball.vx = spd * Math.cos(angle); ball.vy = spd * Math.sin(angle);
}

function startGame() { score = 0; lives = 3; level = 1; paddle.x = W/2 - paddle.w/2; makeBlocks(); resetBall(); state = 'play'; paused = false; missAnim = null; particles = []; }
function nextLevel() { level++; makeBlocks(); resetBall(); state = 'play'; missAnim = null; }
function emit(x, y, color, count) { for (let i = 0; i < (count || 8); i++) { const a = Math.random() * Math.PI * 2; const spd = 1.5 + Math.random() * 2.5; particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color }); } }
function emitMiss(x, y) { for (let i = 0; i < 20; i++) { const a = -Math.PI + Math.random() * Math.PI; const spd = 2 + Math.random() * 4; particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 2, life: 1, color: '#e24b4a' }); } }
function updateParticles() { particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.04; }); }
function drawParticles() { particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1; }

function drawBg() { ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0, 0, W, H); }
function drawMissFlash() { if (!missAnim) return; const alpha = Math.max(0, 0.45 - missAnim.t * 0.015); ctx.fillStyle = `rgba(226,75,74,${alpha})`; ctx.fillRect(0, 0, W, H); }
function drawPaddle(shake) { const sx = shake ? (Math.random() - 0.5) * 6 : 0; const sy = shake ? (Math.random() - 0.5) * 3 : 0; const g = ctx.createLinearGradient(paddle.x, paddle.y + sy, paddle.x, paddle.y + sy + paddle.h); g.addColorStop(0, shake ? '#f09595' : '#7f77dd'); g.addColorStop(1, shake ? '#a32d2d' : '#534ab7'); ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(paddle.x + sx, paddle.y + sy, paddle.w, paddle.h, 5); ctx.fill(); }
function drawBall() { ctx.shadowColor = '#aaa9ec'; ctx.shadowBlur = 10; ctx.fillStyle = '#cecbf6'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; }
function drawBlocks() { blocks.forEach(b => { if (!b.alive) return; ctx.fillStyle = b.color; ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 2); ctx.fill(); if (b.hp > 1) { ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h / 2.5, [2, 2, 0, 0]); ctx.fill(); } }); }
function drawUI() { document.getElementById('score').textContent = score; document.getElementById('lives').textContent = lives; document.getElementById('level').textContent = level; }
function drawOverlay(line1, line2) { ctx.fillStyle = 'rgba(13,13,26,0.72)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#cecbf6'; ctx.font = '500 22px -apple-system, sans-serif'; ctx.textAlign = 'center'; ctx.fillText(line1, W/2, H/2 - 10); ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '400 14px -apple-system, sans-serif'; ctx.fillText(line2, W/2, H/2 + 18); ctx.textAlign = 'left'; }
function drawMissOverlay() { if (!missAnim || missAnim.t < 20) return; const alpha = Math.min(1, (missAnim.t - 20) / 20) * 0.75; ctx.fillStyle = `rgba(13,13,26,${alpha})`; ctx.fillRect(0, 0, W, H); if (missAnim.t > 30) { ctx.globalAlpha = Math.min(1, (missAnim.t - 30) / 15); ctx.fillStyle = '#f09595'; ctx.font = '500 26px -apple-system, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('ミス！', W/2, H/2 - 14); ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '400 14px -apple-system, sans-serif'; ctx.fillText(lives > 0 ? `残機 ${lives}  — Tap/Enterで続ける` : 'Tap/Enterでリスタート', W/2, H/2 + 16); ctx.textAlign = 'left'; ctx.globalAlpha = 1; } }

// 一時停止画面の描画処理を追加
function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(13,13,26,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#cecbf6';
  ctx.font = '500 22px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('一時停止中', W/2, H/2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '400 13px -apple-system, sans-serif';
  ctx.fillText('Shift で再開', W/2, H/2 + 24);
  ctx.textAlign = 'left';
}

function update() {
  drawBg();
  if (state === 'idle') { drawBlocks(); drawOverlay('BLOCK BREAKER', 'Enter/タップでスタート'); drawUI(); requestAnimationFrame(update); return; }
  if (state === 'dead') { drawBlocks(); drawPaddle(false); updateParticles(); drawParticles(); drawOverlay('GAME OVER', 'Enter/タップでリスタート'); drawUI(); requestAnimationFrame(update); return; }
  if (state === 'clear') { drawOverlay(`LEVEL ${level} CLEAR!`, 'Enter/タップで次のレベルへ'); drawUI(); requestAnimationFrame(update); return; }
  if (state === 'allclear') { drawOverlay('全ステージクリア！', 'Enter/タップで最初から'); drawUI(); requestAnimationFrame(update); return; }

  const isMiss = state === 'miss';

  if (!paused && !isMiss) {
    const spd = paddle.speed + (level - 1) * 0.5;
    /* PCのキーボード操作 */
    if (keys['ArrowLeft'])  paddle.x = Math.max(0, paddle.x - spd);
    if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + spd);

    ball.x += ball.vx; ball.y += ball.vy;

    if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
    if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

    if (ball.vy > 0 && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 4) {
      const rel = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const angle = rel * (Math.PI / 3);
      const s2 = Math.hypot(ball.vx, ball.vy);
      ball.vx = s2 * Math.sin(angle); ball.vy = -Math.abs(s2 * Math.cos(angle)); ball.y = paddle.y - ball.r;
    }

    if (ball.y - ball.r > H) { lives--; emitMiss(ball.x, H); missAnim = { t: 0 }; state = 'miss'; }

    let earliest = null, bestOverlap = Infinity;
    for (let b of blocks) {
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
        const oL = ball.x + ball.r - b.x, oR = b.x + b.w - (ball.x - ball.r), oT = ball.y + ball.r - b.y, oB = b.y + b.h - (ball.y - ball.r);
        const ov = Math.min(oL, oR, oT, oB);
        if (ov < bestOverlap) { bestOverlap = ov; earliest = b; }
      }
    }
    if (earliest) {
      const b = earliest;
      const cx = Math.max(b.x, Math.min(ball.x, b.x + b.w)), cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
      const nx = ball.x - cx, ny = ball.y - cy;
      if (Math.abs(nx) >= Math.abs(ny)) { ball.vx = -ball.vx; ball.x += ball.vx * 0.5; } 
      else { ball.vy = -ball.vy; ball.y += ball.vy * 0.5; }
      b.hp--; if (b.hp <= 0) { b.alive = false; emit(b.x + b.w / 2, b.y + b.h / 2, b.color, 8); }
      score += 10;
    }

    updateParticles();
    if (blocks.every(b => !b.alive)) state = level >= 5 ? 'allclear' : 'clear';
  }

  if (isMiss) { missAnim.t++; updateParticles(); drawMissFlash(); }

  drawBlocks(); drawPaddle(isMiss && missAnim && missAnim.t < 18);
  if (state === 'play') drawBall(); drawParticles();
  
  if (isMiss) drawMissOverlay();
  
  // ポーズ画面の描画呼び出しを追加
  if (paused && state === 'play') drawPauseOverlay();

  drawUI(); requestAnimationFrame(update);
}

function handleAction() {
  if (state === 'idle' || state === 'dead' || state === 'allclear') { startGame(); return; }
  if (state === 'clear') { nextLevel(); return; }
  if (state === 'miss') { if (lives <= 0) { state = 'dead'; return; } paddle.x = W/2 - paddle.w/2; resetBall(); state = 'play'; missAnim = null; return; }
}

/* PCキーボードとスマホタッチ操作の共存 */
document.addEventListener('keydown', e => { 
  keys[e.key] = true; 
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
  if (e.key === 'Enter') handleAction();
  // Shiftキーで一時停止を追加
  if (e.key === 'Shift') { e.preventDefault(); if (state === 'play') paused = !paused; }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', () => handleAction());
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); }, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state === 'play' && !paused) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const touchX = (e.touches[0].clientX - rect.left) * scaleX;
    paddle.x = Math.max(0, Math.min(W - paddle.w, touchX - paddle.w / 2));
  }
}, {passive: false});

makeBlocks(); update();
</script>
</body>
</html>
