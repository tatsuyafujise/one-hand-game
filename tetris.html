<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テトリス</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh; overflow: hidden; }
  
  /* PC用基本レイアウト */
  #tetris-wrap { display: flex; gap: 24px; align-items: flex-start; justify-content: center; margin-top: 20px;}
  #game-canvas { border: 1px solid #444; background: #111; display: block; height: 600px; width: 300px; }
  #side-panel { display: flex; flex-direction: column; gap: 12px; min-width: 120px; }
  .panel-box { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 12px; text-align: center; }
  .panel-label { font-size: 11px; color: #888; }
  .panel-value { font-size: 22px; font-weight: bold; }
  #next-canvas { display: block; background: #111; border-radius: 4px; margin: 0 auto; width: 80px; height: 80px; }
  #start-btn { padding: 12px; border-radius: 8px; background: #3498db; color: #fff; font-size: 16px; font-weight: bold; border: none; cursor: pointer; width: 100%; }
  
  #controls-info { font-size: 11px; color: #888; line-height: 1.8; text-align: left;}
  
  /* PCではスマホ用ボタンを隠す */
  #mobile-controls { display: none; }

  /* スマホ用（画面幅が768px以下の場合に適用されるスタイル） */
  @media (max-width: 768px) {
    #tetris-wrap { flex-direction: row; gap: 15px; margin-top: 40px; }
    #game-canvas { height: 480px; width: 240px; }
    #side-panel { min-width: 80px; }
    .panel-box { padding: 8px; }
    #next-canvas { width: 60px; height: 60px; }
    
    /* PC用キーボード説明を隠す */
    .pc-only { display: none; }
    
    /* スマホ用ボタンを表示 */
    #mobile-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; width: 100%; max-width: 300px; }
    .ctrl-btn { background: #444; border: none; color: white; padding: 15px; font-size: 24px; border-radius: 8px; touch-action: manipulation; }
    .ctrl-btn:active { background: #666; }
    #btn-up { grid-column: 2; }
    #btn-left { grid-column: 1; }
    #btn-down { grid-column: 2; }
    #btn-right { grid-column: 3; }
    #btn-drop { grid-column: 1 / 4; background: #d35400; font-size: 16px; padding: 10px; }
  }
</style>
</head>
<body>

  <a href="index.html" class="back-to-menu">← 戻る</a>
  <style>
    .back-to-menu { position: absolute; top: 10px; left: 10px; background-color: #3498db; color: #ffffff; text-decoration: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 9999; }
  </style>

<div style="text-align: center; color: #aaa; font-size: 14px; height: 20px;" id="msg"></div>

<div id="tetris-wrap">
  <canvas id="game-canvas" width="300" height="600"></canvas>
  <div id="side-panel">
    <div class="panel-box"><div class="panel-label">SCORE</div><div class="panel-value" id="score-val">0</div></div>
    <div class="panel-box"><div class="panel-label">LEVEL</div><div class="panel-value" id="level-val">1</div></div>
    <div class="panel-box"><div class="panel-label">NEXT</div><canvas id="next-canvas" width="80" height="80"></canvas></div>
    <button id="start-btn">スタート</button>
    
    <div class="panel-box pc-only">
      <div id="controls-info">
        ← → : 移動<br>↑ : 回転<br>↓ : 下移動<br>Space : 落下<br>Shift : 一時停止<br>Enter : 開始
      </div>
    </div>
  </div>
</div>

<div id="mobile-controls">
  <button class="ctrl-btn" id="btn-up">↻</button>
  <button class="ctrl-btn" id="btn-left">←</button>
  <button class="ctrl-btn" id="btn-down">↓</button>
  <button class="ctrl-btn" id="btn-right">→</button>
  <button class="ctrl-btn" id="btn-drop">一気に落とす</button>
</div>

<script>
const COLS = 10, ROWS = 20;
let BLOCK = 30; // 基本ブロックサイズ
if (window.innerWidth <= 768) { BLOCK = 24; } // スマホの場合は小さくする

const COLORS = ['','#FF4136','#FF851B','#FFDC00','#2ECC40','#0074D9','#B10DC9','#7FDBFF'];
const PIECES = [null,[[1,1,1,1]],[[2,2],[2,2]],[[0,3,0],[3,3,3]],[[4,0],[4,0],[4,4]],[[0,5],[0,5],[5,5]],[[6,6,0],[0,6,6]],[[0,7,7],[7,7,0]]];

const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas'), nctx = nextCanvas.getContext('2d');
let board, piece, nextPiece, score, level, lines, gameOver, paused, raf, dropInterval, lastDrop;

// スマホ判定してキャンバスサイズをJS側でも更新
if (window.innerWidth <= 768) {
  canvas.width = 240; canvas.height = 480;
  nextCanvas.width = 60; nextCanvas.height = 60;
}

function newBoard() { return Array.from({ length: ROWS }, () => Array(COLS).fill(0)); }
function randPiece() { const id = Math.floor(Math.random() * 7) + 1; return { id, shape: PIECES[id].map(r => [...r]), x: 4, y: 0 }; }

function draw() {
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
    ctx.strokeStyle='#222'; ctx.strokeRect(c*BLOCK, r*BLOCK, BLOCK, BLOCK);
    if(board[r][c]) drawBlock(ctx, c, r, board[r][c], BLOCK);
  }
  if (piece) { drawGhost(); drawPiece(ctx, piece, 0, 0, BLOCK); }
  drawNext();
}

function drawBlock(c2d, cx, cy, id, bs) { c2d.fillStyle=COLORS[id]; c2d.fillRect(cx*bs+1, cy*bs+1, bs-2, bs-2); }
function drawPiece(c2d, p, ox, oy, bs) { p.shape.forEach((row, r) => row.forEach((v, c) => { if (v) drawBlock(c2d, p.x+c+ox, p.y+r+oy, p.id, bs); })); }
function ghostY() { let gy = piece.y; while (!collide({ ...piece, y: gy + 1 })) gy++; return gy; }
function drawGhost() { const gy = ghostY(); ctx.globalAlpha = 0.2; drawPiece(ctx, { ...piece, y: gy }, 0, 0, BLOCK); ctx.globalAlpha = 1; }

// --- 修正箇所：NEXT画面の描画 ---
function drawNext() { 
  nctx.fillStyle='#111'; 
  nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height); 
  if(!nextPiece) return; 
  
  const nBs = window.innerWidth <= 768 ? 12 : 16; 
  const ox = Math.floor((5 - nextPiece.shape[0].length) / 2);
  const oy = Math.floor((5 - nextPiece.shape.length) / 2);
  
  nextPiece.shape.forEach((row, r) => 
    row.forEach((v, c) => { 
      if (v) {
        nctx.fillStyle = COLORS[nextPiece.id]; 
        nctx.fillRect((ox + c) * nBs + 1, (oy + r) * nBs + 1, nBs - 2, nBs - 2);
      }
    })
  ); 
}
// ------------------------------

function collide(p) { return p.shape.some((row, r) => row.some((v, c) => v && (p.y+r >= ROWS || p.x+c < 0 || p.x+c >= COLS || (board[p.y+r] && board[p.y+r][p.x+c])))); }

function lock() {
  piece.shape.forEach((row, r) => row.forEach((v, c) => { if (v && piece.y+r >= 0) board[piece.y+r][piece.x+c] = piece.id; }));
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0;) {
    if (board[r].every(v => v)) { board.splice(r, 1); board.unshift(Array(COLS).fill(0)); cleared++; } else r--;
  }
  if(cleared) { score += [0,100,300,500,800][cleared]*level; lines += cleared; level = Math.floor(lines/10)+1; dropInterval = Math.max(100, 1000 - level*80); }
  piece = nextPiece; nextPiece = randPiece();
  if (collide(piece)) endGame();
  document.getElementById('score-val').textContent = score; document.getElementById('level-val').textContent = level;
}

function rotate(p) {
  const s = p.shape, r = s.length, c = s[0].length;
  const rot = Array.from({ length: c }, (_, nc) => Array.from({ length: r }, (_, nr) => s[r-1-nr][nc]));
  let np = { ...p, shape: rot };
  if (!collide(np)) return np;
  for (let dx of [1,-1,2,-2]) { let t = {...np, x: np.x+dx}; if (!collide(t)) return t; }
  return p;
}

function drop() { piece.y++; if(collide(piece)) { piece.y--; lock(); } lastDrop = performance.now(); }
function moveLeft() { piece.x--; if(collide(piece)) piece.x++; }
function moveRight() { piece.x++; if(collide(piece)) piece.x--; }
function hardDrop() { piece.y = ghostY(); lock(); lastDrop = performance.now(); }

function loop(ts) {
  if (!paused && !gameOver) { if (ts - lastDrop > dropInterval) drop(); draw(); }
  raf = requestAnimationFrame(loop);
}

function startGame() {
  board = newBoard(); score=0; level=1; lines=0; dropInterval=900; gameOver=false; paused=false; piece = randPiece(); nextPiece = randPiece(); lastDrop = performance.now();
  document.getElementById('score-val').textContent=0; document.getElementById('level-val').textContent=1; document.getElementById('msg').textContent='';
  document.getElementById('start-btn').textContent='再開'; document.getElementById('start-btn').blur();
  cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
}

function endGame() { gameOver = true; document.getElementById('msg').textContent = 'ゲームオーバー'; draw(); }

document.getElementById('start-btn').addEventListener('click', startGame);

/* 共存：スマホ用ボタンのイベント */
const addBtn = (id, fn) => {
  const b = document.getElementById(id);
  if(b) {
    b.addEventListener('touchstart', e => { e.preventDefault(); if(!gameOver && !paused && piece){ fn(); draw(); }});
    b.addEventListener('mousedown', e => { e.preventDefault(); if(!gameOver && !paused && piece){ fn(); draw(); }});
  }
};
addBtn('btn-left', moveLeft); addBtn('btn-right', moveRight); addBtn('btn-up', () => piece = rotate(piece));
addBtn('btn-down', drop); addBtn('btn-drop', hardDrop);

/* 共存：PCキーボードのイベント */
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') { startGame(); return; }
  if(!piece || gameOver) return;
  
  // Shiftキーで一時停止
  if(e.key === 'Shift') {
    paused = !paused;
    document.getElementById('msg').textContent = paused ? '一時停止' : '';
    if(!paused) { lastDrop = performance.now(); raf = requestAnimationFrame(loop); }
    return;
  }
  
  if(paused) return; 
  
  if(e.key === 'ArrowLeft') moveLeft(); else if(e.key === 'ArrowRight') moveRight();
  else if(e.key === 'ArrowDown') drop(); else if(e.key === 'ArrowUp') piece = rotate(piece);
  else if(e.key === ' ') hardDrop();
  draw();
});

ctx.fillStyle='#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#555'; ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.fillText('スタートを押してね', canvas.width/2, canvas.height/2);
</script>
</body>
</html>
