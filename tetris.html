<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テトリス</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; padding: 2rem; min-height: 100vh; }
  #tetris-wrap { display: flex; gap: 24px; align-items: flex-start; }
  #game-canvas { border: 1px solid #444; background: #111; display: block; }
  #side-panel { min-width: 120px; }
  .panel-box { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .panel-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .panel-value { font-size: 22px; font-weight: 500; color: #eee; }
  #next-canvas { display: block; background: #111; border-radius: 4px; }
  #start-btn { width: 100%; padding: 8px; border: 1px solid #555; border-radius: 8px; background: #2a2a2a; color: #eee; font-size: 14px; cursor: pointer; }
  #start-btn:hover { background: #333; }
  #controls-info { font-size: 11px; color: #888; line-height: 1.8; }
  #msg { text-align: center; font-size: 14px; font-weight: 500; color: #aaa; margin-top: 6px; height: 20px; }
</style>
</head>
<body>
  <a href="index.html" class="back-to-menu">← メニューに戻る</a>
      <style>
        .back-to-menu {
          position: fixed; /* 画面の左上に固定 */
          top: 20px;
          left: 20px;
          background-color: #3498db;
          color: #ffffff;
          text-decoration: none;
          padding: 10px 20px;
          border-radius: 25px;
          font-family: 'Helvetica Neue', Arial, sans-serif;
          font-weight: bold;
          font-size: 14px;
          box-shadow: 0 4px 6px rgba(0,0,0,0.2);
          transition: all 0.2s ease;
          z-index: 9999; /* 常に一番手前に表示 */
        }
        .back-to-menu:hover {
          background-color: #2980b9;
          transform: translateY(-2px);
        }
      </style>
<div id="tetris-wrap">
  <div>
    <canvas id="game-canvas" width="300" height="600"></canvas>
    <div id="msg"></div>
  </div>
  <div id="side-panel">
    <div class="panel-box">
      <div class="panel-label">SCORE</div>
      <div class="panel-value" id="score-val">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LEVEL</div>
      <div class="panel-value" id="level-val">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">LINES</div>
      <div class="panel-value" id="lines-val">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">NEXT</div>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <button id="start-btn">スタート</button>
    <div class="panel-box" style="margin-top:12px;">
      <div id="controls-info">
        ← → : 移動<br>
        ↑ : 回転<br>
        ↓ : 下移動<br>
        Space : 落下<br>
        Shift : 一時停止<br>
        Enter : スタート
      </div>
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const COLORS = ['','#FF4136','#FF851B','#FFDC00','#2ECC40','#0074D9','#B10DC9','#7FDBFF'];
const PIECES = [
  null,
  [[1,1,1,1]],         // I
  [[2,2],[2,2]],       // O
  [[0,3,0],[3,3,3]],   // T
  [[4,0],[4,0],[4,4]], // L
  [[0,5],[0,5],[5,5]], // J
  [[6,6,0],[0,6,6]],   // S
  [[0,7,7],[7,7,0]]    // Z
];

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

let board, piece, nextPiece, score, level, lines, gameOver, paused, raf, dropInterval, lastDrop;

function newBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
}

function randPiece() {
  const id = Math.floor(Math.random() * 7) + 1;
  const shape = PIECES[id].map(r => [...r]);
  return { id, shape, x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2), y: 0 };
}

// --- 描画 ---

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawBoard();
  drawGhost();
  if (piece) drawPiece(ctx, piece, 0, 0, BLOCK);
  drawNext();
}

function drawGrid() {
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(COLS * BLOCK, r * BLOCK); ctx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, ROWS * BLOCK); ctx.stroke();
  }
}

function drawBoard() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c], BLOCK);
}

function drawBlock(c2d, cx, cy, id, bs) {
  c2d.fillStyle = COLORS[id];
  c2d.fillRect(cx * bs + 1, cy * bs + 1, bs - 2, bs - 2);
  c2d.fillStyle = 'rgba(255,255,255,0.2)';
  c2d.fillRect(cx * bs + 1, cy * bs + 1, bs - 2, 3);
  c2d.fillStyle = 'rgba(0,0,0,0.2)';
  c2d.fillRect(cx * bs + 1, cy * bs + bs - 4, bs - 2, 3);
}

function drawPiece(c2d, p, ox, oy, bs) {
  p.shape.forEach((row, r) =>
    row.forEach((v, c) => { if (v) drawBlock(c2d, p.x + c + ox, p.y + r + oy, p.id, bs); })
  );
}

function ghostY() {
  let gy = piece.y;
  while (!collide({ ...piece, y: gy + 1 })) gy++;
  return gy;
}

function drawGhost() {
  if (!piece) return;
  const gy = ghostY();
  ctx.globalAlpha = 0.2;
  piece.shape.forEach((row, r) =>
    row.forEach((v, c) => {
      if (v) {
        ctx.fillStyle = COLORS[piece.id];
        ctx.fillRect((piece.x + c) * BLOCK + 1, (gy + r) * BLOCK + 1, BLOCK - 2, BLOCK - 2);
      }
    })
  );
  ctx.globalAlpha = 1;
}

function drawNext() {
  nctx.fillStyle = '#111';
  nctx.fillRect(0, 0, 80, 80);
  if (!nextPiece) return;
  const bs = 16;
  const ox = Math.floor((5 - nextPiece.shape[0].length) / 2);
  const oy = Math.floor((5 - nextPiece.shape.length) / 2);
  nextPiece.shape.forEach((row, r) =>
    row.forEach((v, c) => {
      if (v) {
        nctx.fillStyle = COLORS[nextPiece.id];
        nctx.fillRect((ox + c) * bs + 1, (oy + r) * bs + 1, bs - 2, bs - 2);
      }
    })
  );
}

// --- 接触判定 ---

function collide(p) {
  return p.shape.some((row, r) =>
    row.some((v, c) =>
      v && (
        p.y + r >= ROWS ||                              // 床
        p.x + c < 0 ||                                  // 左壁
        p.x + c >= COLS ||                              // 右壁
        (board[p.y + r] && board[p.y + r][p.x + c])    // 他ブロック
      )
    )
  );
}

// --- ゲームロジック ---

function lock() {
  piece.shape.forEach((row, r) =>
    row.forEach((v, c) => { if (v && piece.y + r >= 0) board[piece.y + r][piece.x + c] = piece.id; })
  );
  clearLines();
  piece = nextPiece;
  nextPiece = randPiece();
  if (collide(piece)) { endGame(); return; }
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
  document.getElementById('lines-val').textContent = lines;
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0;) {
    if (board[r].every(v => v)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
    } else {
      r--;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += pts[cleared] * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - level * 80);
  }
}

function rotate(p) {
  const s = p.shape, rows = s.length, cols = s[0].length;
  const rot = Array.from({ length: cols }, (_, c) =>
    Array.from({ length: rows }, (_, r) => s[rows - 1 - r][c])
  );
  const np = { ...p, shape: rot };
  if (!collide(np)) return np;
  // 壁蹴り
  for (const dx of [1, -1, 2, -2]) {
    const t = { ...np, x: np.x + dx };
    if (!collide(t)) return t;
  }
  return p;
}

function drop() {
  piece.y++;
  if (collide(piece)) { piece.y--; lock(); }
  lastDrop = performance.now();
}

function hardDrop() {
  piece.y = ghostY();
  lock();
  lastDrop = performance.now();
}

function moveLeft()  { piece.x--; if (collide(piece)) piece.x++; }
function moveRight() { piece.x++; if (collide(piece)) piece.x--; }

// --- ゲームループ ---

function loop(ts) {
  if (!paused && !gameOver) {
    if (ts - lastDrop > dropInterval) drop();
    draw();
  }
  raf = requestAnimationFrame(loop);
}

function startGame() {
  cancelAnimationFrame(raf);
  board = newBoard();
  score = 0; level = 1; lines = 0; dropInterval = 900;
  gameOver = false; paused = false;
  piece = randPiece();
  nextPiece = randPiece();
  lastDrop = performance.now();
  document.getElementById('score-val').textContent = 0;
  document.getElementById('level-val').textContent = 1;
  document.getElementById('lines-val').textContent = 0;
  document.getElementById('msg').textContent = '';
  document.getElementById('start-btn').textContent = 'リスタート';
  
  // Enter連打などの誤動作を防ぐため、ボタンのフォーカスを外す
  document.getElementById('start-btn').blur(); 
  
  raf = requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  document.getElementById('msg').textContent = 'ゲームオーバー';
  document.getElementById('start-btn').textContent = 'もう一度';
  draw();
  
  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#000';
  ctx.strokeText('Game Over', canvas.width / 2, 80);
  
  ctx.fillStyle = '#ff4444';
  ctx.fillText('Game Over', canvas.width / 2, 80);
}

// --- 入力 ---

document.getElementById('start-btn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  // Enterキー（MacのReturnキー）でスタート処理を実行
  if (e.key === 'Enter') {
    e.preventDefault();
    startGame();
    return;
  }

  // 初期状態またはゲームオーバー時は他のキー操作を無効化
  if (!piece || gameOver) return;
  
  if (e.key === 'Shift') {
    paused = !paused;
    document.getElementById('msg').textContent = paused ? '一時停止' : '';
    if (!paused) { lastDrop = performance.now(); raf = requestAnimationFrame(loop); }
    return;
  }
  
  if (paused) return;
  
  if      (e.key === 'ArrowLeft')  { e.preventDefault(); moveLeft(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
  else if (e.key === 'ArrowDown')  { e.preventDefault(); drop(); score += 1; }
  else if (e.key === 'ArrowUp')    { e.preventDefault(); piece = rotate(piece); }
  else if (e.key === ' ')          { e.preventDefault(); hardDrop(); }
  draw();
});

// 初期画面
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#555';
ctx.font = '16px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('スタートを押してね', canvas.width / 2, canvas.height / 2);
</script>
</body>
</html>
